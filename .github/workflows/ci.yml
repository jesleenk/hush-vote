name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install deps
        run: npm install
      - name: Typecheck frontend
        run: npm run typecheck
      - name: Run tests
        run: npm test

  contract-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install Compact compiler
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/midnightntwrk/compact/releases/latest/download/compact-installer.sh | sh
      - name: Add Compact to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Select default Compact compiler
        run: compact update
      - name: Install deps
        run: npm install
      - name: Build contract
        run: npm run contract:build
